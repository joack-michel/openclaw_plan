name: 更新文件用途备注

on:
  issues:
    types: [opened]

permissions:
  contents: write

jobs:
  update-notes:
    if: github.event.issue.title == '更新文件用途备注'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 逐个更新文件用途提交说明
        shell: bash
        run: |
          set -euo pipefail

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          mark() {
            local path="$1"
            local message="$2"
            if [ ! -f "$path" ]; then
              printf '跳过不存在文件：%s\n' "$path"
              return 0
            fi
            printf '\n' >> "$path"
            git add -- "$path"
            git commit -m "$message"
          }

          mark 'config/agents.example.json' 'Agent 角色配置示例'
          mark 'config/automations.example.json' '自动化任务配置示例'
          mark 'config/execution-gate.example.json' 'Execution Gate 配置示例'
          mark 'config/grants.example.json' 'Automation Grant 权限示例'

          mark 'docs/ARCHITECTURE.md' '系统架构与执行流程'
          mark 'docs/CUSTOMIZATION.md' '实例自定义配置指南'
          mark 'docs/PRIVATE-BACKUP.md' '私有数据加密备份指南'
          mark 'docs/RECOVERY.md' '新实例安装与恢复流程'
          mark 'docs/SECURITY-MODEL.md' '风险分级与安全模型说明'

          mark 'examples/access-control/config.example.json' '门禁适配器配置示例'
          mark 'examples/baipiaowang/automation.example.json' '福利任务编排示例'
          mark 'examples/mcdonalds/provider.example.json' '麦当劳 Provider 配置示例'
          mark 'examples/meituan/provider.example.json' '美团 Provider 配置示例'
          mark 'examples/memory/MEMORY.example.md' '分层记忆索引示例'
          mark 'examples/memory/SESSION-STATE.example.md' '会话状态记录示例'
          mark 'examples/rem/learning.example.md' 'REM 经验记录示例'
          mark 'examples/rem/topic.example.md' 'REM 主题记忆示例'

          mark 'policy/execution-policy.example.md' '执行权限分级示例'
          mark 'policy/security-constitution.example.md' '全局安全边界示例'
          mark 'policy/tool-risk-map.example.json' '工具风险映射配置'

          mark 'scripts/apply-private-overlay.sh' '应用本地私有配置'
          mark 'scripts/export-public-template.sh' '导出脱敏公开模板'
          mark 'scripts/install-template.sh' '安装模板到运行目录'
          mark 'scripts/restore-remaining-files.sh' '还原归档源码与测试'
          mark 'scripts/run-tests.sh' '运行核心测试'
          mark 'scripts/test-verify-public-template.sh' '测试脱敏验证脚本'
          mark 'scripts/verify-public-template.sh' '检查敏感信息与发布安全'

          mark 'sql/schema.sql' 'Execution Gate 数据库结构'

          mark 'src/automation-scope.js' '识别并限制自动化运行范围'
          mark 'src/canonical-json.js' '规范化参数并生成稳定哈希'
          mark 'src/capability-resolver.js' '将工具调用解析为能力'
          mark 'src/confirmation-scope.js' '生成跨回合确认作用域'
          mark 'src/destination-identity.js' '识别消息目标与本人通知'
          mark 'src/door-fast-path.js' '门禁直通锁与重复执行防护'
          mark 'src/exec-effect-resolver.js' '分析 Shell 命令实际影响'
          mark 'src/grant-store.js' '管理 Automation Grant 权限'
          mark 'src/index.js' 'Execution Gate 插件主入口'
          mark 'src/integrity-monitor.js' '监控策略文件完整性'
          mark 'src/mutation-effect-resolver.js' '分析文件与配置修改影响'
          mark 'src/operation-store.js' '持久化确认操作与执行状态'
          mark 'src/path-policy.js' '检查路径范围与符号链接逃逸'
          mark 'src/plugin-entry.js' '导出 OpenClaw 插件入口'
          mark 'src/risk-resolver.js' '计算允许、确认和拒绝决策'
          mark 'src/script-identity.js' '识别固定脚本与命令身份'
          mark 'src/template-config.js' '读取模板配置与 Agent ID'

          mark 'test/exec-effect-resolver.test.js' 'Shell 命令影响解析测试'
          mark 'test/grant-store.test.js' 'Automation Grant 权限测试'
          mark 'test/integrity-monitor.test.js' '完整性监控测试'
          mark 'test/mock-hook.test.js' 'OpenClaw Hook 流程模拟测试'
          mark 'test/operation-store.test.js' '确认操作状态机测试'
          mark 'test/path-policy.test.js' '路径与符号链接安全测试'
          mark 'test/risk-resolver.test.js' '风险决策规则测试'
          mark 'test/template-config.test.js' '模板配置解析测试'

          git rm -- '.github/workflows/update-purpose-notes.yml'
          git commit -m '清理一次性用途备注任务'
          git push

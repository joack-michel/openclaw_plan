name: Complete sanitized template import

on:
  push:
    branches: [main]
    paths:
      - '.import/**'

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Extract remaining sanitized files
        shell: bash
        run: |
          set -euo pipefail
          base64 -d .import/remaining.tgz.b64 > /tmp/remaining.tgz
          tar -xzf /tmp/remaining.tgz
          rm -rf .import .github/workflows/import-remaining.yml
      - name: Commit completed template
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Complete sanitized OpenClaw template import'
          git push
